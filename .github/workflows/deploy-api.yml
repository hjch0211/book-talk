name: Deploy API (Backend + Batch)
run-name: Deploy API to ${{ inputs.environment }} by @${{ github.triggering_actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        type: choice
        options:
          - development
          - production
        default: 'development'
        required: true
  workflow_call:
    inputs:
      environment:
        type: string
        required: true

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  APP_DEBATE_MAX_MEMBER_COUNT: ${{ secrets.APP_DEBATE_MAX_MEMBER_COUNT }}
  APP_DEBATE_ROUND_SPEAKER_SECONDS: ${{ secrets.APP_DEBATE_ROUND_SPEAKER_SECONDS }}
  APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
  DB_URL: ${{ secrets.DB_URL }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  JPA_SHOW_SQL: ${{ secrets.JPA_SHOW_SQL }}
  REDIS_HOST: ${{ secrets.REDIS_HOST }}
  REDIS_PORT: ${{ secrets.REDIS_PORT }}
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
  AES_SECRET_STRING: ${{ secrets.AES_SECRET_STRING }}
  JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
  JWT_ACCESS_AUDIENCE: ${{ secrets.JWT_ACCESS_AUDIENCE }}
  JWT_ACCESS_ISSUER: ${{ secrets.JWT_ACCESS_ISSUER }}
  JWT_ACCESS_EXPIRING_TIME: ${{ secrets.JWT_ACCESS_EXPIRING_TIME }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  JWT_REFRESH_AUDIENCE: ${{ secrets.JWT_REFRESH_AUDIENCE }}
  JWT_REFRESH_ISSUER: ${{ secrets.JWT_REFRESH_ISSUER }}
  JWT_REFRESH_EXPIRING_TIME: ${{ secrets.JWT_REFRESH_EXPIRING_TIME }}
  NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
  NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
  MAIL_HOST: ${{ secrets.MAIL_HOST }}
  MAIL_PORT: ${{ secrets.MAIL_PORT }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  MAIL_FROM_EMAIL: ${{ secrets.MAIL_FROM_EMAIL }}
  MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
  APP_FRONTEND_URL: ${{ secrets.APP_FRONTEND_URL }}

jobs:
  deploy:
    name: Deploy Backend & Batch
    runs-on: self-hosted
    defaults:
      run:
        working-directory: book-talk-be
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Validate prerequisites
        run: |
          docker --version
          docker compose version

      - name: Ensure Docker network exists
        run: docker network inspect booktalk-internal >/dev/null 2>&1 || docker network create booktalk-internal

      - name: Set compose file
        run: |
          if [ "${{ inputs.environment }}" == "development" ]; then
            echo "COMPOSE_ARGS=-p booktalk-dev -f docker-compose.dev.yml" >> $GITHUB_ENV
          else
            echo "COMPOSE_ARGS=-p booktalk-prod" >> $GITHUB_ENV
          fi

      - name: Stop existing containers
        run: |
          docker compose ${{ env.COMPOSE_ARGS }} stop backend batch
          docker compose ${{ env.COMPOSE_ARGS }} rm -f backend batch

      - name: Build backend image
        run: docker compose ${{ env.COMPOSE_ARGS }} build backend

      - name: Build batch image
        run: docker compose ${{ env.COMPOSE_ARGS }} build batch

      - name: Start services
        run: docker compose ${{ env.COMPOSE_ARGS }} up -d --no-deps backend batch

      - name: Wait and health check
        run: |
          sleep 10
          echo "Container status:"
          docker compose ${{ env.COMPOSE_ARGS }} ps backend batch

      - name: Show recent logs
        if: always()
        run: |
          echo "=== Backend Logs ==="
          docker compose ${{ env.COMPOSE_ARGS }} logs --tail=20 backend
          echo "=== Batch Logs ==="
          docker compose ${{ env.COMPOSE_ARGS }} logs --tail=20 batch
